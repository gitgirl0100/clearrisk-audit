<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearRisk Audit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0b0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .container {
            background: #1a1a1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            width: 720px;
            max-width: 90%;
        }

        h1 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 2.2rem;
        }

        h2, h3 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #5fb64b;
            color: black;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 22px;
        }

        button:hover {
            background-color: #54a842;
        }

        .result,
        .error,
        .history {
            background: #202027;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .error {
            color: #ffb3b3;
        }

        .result p,
        .history p {
            margin: 8px 0;
            word-break: break-word;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 6px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 12px;
        }

        .history-card {
            background: #2a2a33;
            border-radius: 8px;
            padding: 14px;
        }

        .history-card p {
            margin: 6px 0;
            font-size: 0.96rem;
        }

        .empty-history {
            color: #cfcfcf;
            margin-top: 10px;
        }

        .secondary-button {
            background-color: #3b82f6;
            color: white;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .secondary-button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClearRisk Audit</h1>

        <label for="contractAddress">Enter Token Contract Address:</label>
        <input
            type="text"
            id="contractAddress"
            placeholder="0x1234567890abcdef1234567890abcdef12345678"
        />

        <button onclick="evaluateRisk()">Evaluate Risk</button>

        <div id="message"></div>

        <div class="history">
            <h2>Report History</h2>
            <p>Previously saved audit reports are listed below.</p>
            <button class="secondary-button" onclick="loadReportHistory()">Refresh Report History</button>
            <div id="historyContainer" class="history-list"></div>
        </div>
    </div>

    <script>
        async function evaluateRisk() {
            const contractAddress = document.getElementById("contractAddress").value.trim();
            const messageDiv = document.getElementById("message");

            messageDiv.innerHTML = "";

            try {
                const response = await fetch("/api/evaluate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ contractAddress })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageDiv.innerHTML = `
                        <div class="error">
                            <strong>Error:</strong> ${data.error || "Request failed."}
                        </div>
                    `;
                    return;
                }

                messageDiv.innerHTML = `
                    <div class="result">
                        <h2>Audit Result</h2>
                        <p><strong>Audit ID:</strong> ${data.auditId}</p>
                        <p><strong>Contract Address:</strong> ${data.contractAddress}</p>
                        <p><strong>Final Score:</strong> ${data.finalScore}</p>
                        <p><strong>Risk Tier:</strong> ${data.riskTier}</p>
                        <p><strong>Report Hash:</strong> ${data.reportHash}</p>
                        <p><strong>Created At:</strong> ${formatDate(data.createdAt)}</p>
                        <p><strong>Blockchain Logged:</strong> ${data.blockchainLogged}</p>

                        <h3>Breakdown</h3>
                        <ul>
                            <li><strong>Ownership Risk:</strong> ${data.breakdown.ownershipRisk}</li>
                            <li><strong>Liquidity Risk:</strong> ${data.breakdown.liquidityRisk}</li>
                            <li><strong>Distribution Risk:</strong> ${data.breakdown.distributionRisk}</li>
                            <li><strong>Code Transparency Risk:</strong> ${data.breakdown.codeTransparencyRisk}</li>
                            <li><strong>Activity Risk:</strong> ${data.breakdown.activityRisk}</li>
                        </ul>
                    </div>
                `;

                await loadReportHistory();
            } catch (error) {
                messageDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Server connection error. Make sure the backend is running.
                    </div>
                `;
            }
        }

        async function loadReportHistory() {
            const historyContainer = document.getElementById("historyContainer");

            historyContainer.innerHTML = "<p class='empty-history'>Loading report history...</p>";

            try {
                const response = await fetch("/api/reports");
                const reports = await response.json();

                if (!response.ok) {
                    historyContainer.innerHTML = `
                        <p class="empty-history">Unable to load report history.</p>
                    `;
                    return;
                }

                if (!reports || reports.length === 0) {
                    historyContainer.innerHTML = `
                        <p class="empty-history">No saved reports found yet.</p>
                    `;
                    return;
                }

                historyContainer.innerHTML = reports.map(report => `
                    <div class="history-card">
                        <p><strong>Audit ID:</strong> ${report.id}</p>
                        <p><strong>Contract Address:</strong> ${report.contractAddress}</p>
                        <p><strong>Final Score:</strong> ${report.finalScore}</p>
                        <p><strong>Risk Tier:</strong> ${report.riskTier}</p>
                        <p><strong>Report Hash:</strong> ${report.reportHash}</p>
                        <p><strong>Created At:</strong> ${formatDate(report.createdAt)}</p>
                        <p><strong>Blockchain Logged:</strong> ${report.blockchainLogged}</p>
                    </div>
                `).join("");
            } catch (error) {
                historyContainer.innerHTML = `
                    <p class="empty-history">Server connection error while loading report history.</p>
                `;
            }
        }

        function formatDate(dateValue) {
            const date = new Date(dateValue);

            if (isNaN(date.getTime())) {
                return dateValue;
            }

            return date.toLocaleString();
        }

        loadReportHistory();
    </script>
</body>
</html>
