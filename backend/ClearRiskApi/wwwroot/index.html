<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearRisk Audit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0b0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 60px;
        }

        .container {
            background: #1a1a1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            width: 620px;
            max-width: 90%;
        }

        h1 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 2.2rem;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #5fb64b;
            color: black;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 22px;
        }

        button:hover {
            background-color: #54a842;
        }

        .result,
        .error {
            background: #202027;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .error {
            color: #ffb3b3;
        }

        .result h2 {
            margin-top: 0;
        }

        .result p {
            margin: 8px 0;
            word-break: break-word;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClearRisk Audit</h1>

        <label for="contractAddress">Enter Token Contract Address:</label>
        <input
            type="text"
            id="contractAddress"
            placeholder="0x1234567890abcdef1234567890abcdef12345678"
        />

        <button onclick="evaluateRisk()">Evaluate Risk</button>

        <div id="message"></div>
    </div>

    <script>
        async function evaluateRisk() {
            const contractAddress = document.getElementById("contractAddress").value.trim();
            const messageDiv = document.getElementById("message");

            messageDiv.innerHTML = "";

            try {
                const response = await fetch("/api/evaluate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ contractAddress })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageDiv.innerHTML = `
                        <div class="error">
                            <strong>Error:</strong> ${data.error || "Request failed."}
                        </div>
                    `;
                    return;
                }

                messageDiv.innerHTML = `
                    <div class="result">
                        <h2>Audit Result</h2>
                        <p><strong>Audit ID:</strong> ${data.auditId}</p>
                        <p><strong>Contract Address:</strong> ${data.contractAddress}</p>
                        <p><strong>Final Score:</strong> ${data.finalScore}</p>
                        <p><strong>Risk Tier:</strong> ${data.riskTier}</p>
                        <p><strong>Report Hash:</strong> ${data.reportHash}</p>
                        <p><strong>Created At:</strong> ${data.createdAt}</p>
                        <p><strong>Blockchain Logged:</strong> ${data.blockchainLogged}</p>

                        <h3>Breakdown</h3>
                        <ul>
                            <li><strong>Ownership Risk:</strong> ${data.breakdown.ownershipRisk}</li>
                            <li><strong>Liquidity Risk:</strong> ${data.breakdown.liquidityRisk}</li>
                            <li><strong>Distribution Risk:</strong> ${data.breakdown.distributionRisk}</li>
                            <li><strong>Code Transparency Risk:</strong> ${data.breakdown.codeTransparencyRisk}</li>
                            <li><strong>Activity Risk:</strong> ${data.breakdown.activityRisk}</li>
                        </ul>
                    </div>
                `;
            } catch (error) {
                messageDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Server connection error. Make sure the backend is running.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
